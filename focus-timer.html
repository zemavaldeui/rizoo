<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RIZO - Focus Timer</title>
    <style>
        /* --- DESIGN SYSTEM --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0a0a0a;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            text-transform: uppercase;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* --- LIGHT MODE OVERRIDES --- */
        body.light-mode {
            background-color: #f4f4f9;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
            color: #111111;
        }

        body.light-mode .navbar { background-color: rgba(255, 255, 255, 0.8); border-bottom: 1px solid rgba(0, 0, 0, 0.1); }
        body.light-mode .icon-btn { background: rgba(0, 0, 0, 0.05); border-color: rgba(0, 0, 0, 0.1); color: #111111; }
        body.light-mode .logo { background: linear-gradient(to right, #111111, #ff4d4d); -webkit-background-clip: text; background-clip: text; }
        body.light-mode .sidebar { background-color: #ffffff; }
        body.light-mode .sidebar-header { border-bottom: 1px solid rgba(0, 0, 0, 0.08); color: #111111; }
        body.light-mode .summary-box, body.light-mode .timer-display, body.light-mode .modal { background-color: #ffffff; border-color: rgba(0, 0, 0, 0.1); box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05); color: #111111; }
        body.light-mode .value { color: #111111; }
        body.light-mode .divider { background: rgba(0, 0, 0, 0.1); }
        body.light-mode .mode-btn { background: #e0e0e0; color: #666; }
        body.light-mode .action-btn { background: #ffffff; border-color: rgba(0,0,0,0.1); color: #111111; }
        body.light-mode .clear-btn { background: #ffffff; color: #111111; border-color: rgba(0,0,0,0.1); }

        /* NAVBAR */
        .navbar {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            z-index: 10;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .icon-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; transition: all 0.3s ease; }
        .logo { font-size: 24px; letter-spacing: 4px; font-weight: 900; background: linear-gradient(to right, #ffffff, #ff4d4d); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }

        /* SIDEBAR */
        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background-color: #0f0f0f; border-right: 1px solid #ff4d4d; transition: transform 0.4s cubic-bezier(0.77, 0, 0.175, 1); z-index: 1000; }
        .sidebar.open { transform: translateX(280px); }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 25px; color: white; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-header h2 { font-size: 18px; letter-spacing: 2px; font-weight: 800; }
        .sidebar-menu { list-style: none; margin-top: 10px; }
        .sidebar-menu a { display: block; color: #888888; text-decoration: none; padding: 18px 25px; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s ease; border-left: 3px solid transparent; }
        .sidebar-menu a:hover { color: #ffffff; background: #151515; border-left-color: #ff4d4d; padding-left: 30px; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px); display: none; z-index: 999; }
        .sidebar-overlay.show { display: block; }

        .container { margin-top: 30px; width: 100%; max-width: 420px; padding: 0 20px; display: flex; flex-direction: column; gap: 15px; }
        .summary-row { display: flex; justify-content: space-between; gap: 15px; }
        .summary-box { background: #111111; border: 1px solid rgba(255, 255, 255, 0.08); flex: 1; padding: 20px 10px; border-radius: 12px; text-align: center; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
        .summary-label { font-size: 11px; font-weight: 800; letter-spacing: 3px; display: block; margin-bottom: 10px; }
        .divider { border: 0; height: 1px; background: rgba(255, 255, 255, 0.1); margin-bottom: 10px; }
        .value { color: white; font-size: 24px; font-weight: 900; }

        .mode-row { display: flex; gap: 10px; }
        .mode-btn { flex: 1; background: #151515; border: 1px solid rgba(255, 255, 255, 0.08); color: #888888; padding: 15px; border-radius: 8px; font-weight: 800; font-size: 12px; cursor: pointer; transition: all 0.2s ease; }
        .mode-btn.active { background: #ff4d4d; color: white; border-color: #ff4d4d; box-shadow: 0 4px 15px rgba(255, 77, 77, 0.3); }

        /* --- ALGORITHM DOWNWARD DIGIT ANIMATION --- */
        .timer-display {
            background: #111111;
            border-top: 3px solid #ff4d4d;
            border-radius: 12px;
            padding: 45px 10px;
            text-align: center;
            font-size: 70px;
            font-weight: 900;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            letter-spacing: -2px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .digit-container {
            display: inline-block;
            height: 80px;
            overflow: hidden;
            position: relative;
            width: 45px;
        }

        .digit {
            display: block;
            position: relative;
        }

        /* DOWNWARD Animation class */
        .roll-down {
            animation: digitRollDown 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes digitRollDown {
            0% { transform: translateY(-100%); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .separator { width: 20px; }

        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .action-btn { background: #151515; border: 1px solid rgba(255, 255, 255, 0.08); padding: 18px 5px; border-radius: 8px; font-size: 11px; font-weight: 800; color: white; cursor: pointer; }
        .action-btn:hover { background: #1a1a1a; transform: translateY(-2px); }
        .btn-green:hover { border-color: #00ff7f; color: #00ff7f; }

        .customize-row { margin-top: 5px; }
        .clear-btn { background: #151515; border: 1px solid rgba(255,255,255,0.1); color: #ffffff; padding: 15px; border-radius: 8px; font-size: 11px; font-weight: 800; width: 100%; cursor: pointer; transition: all 0.3s ease; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 1100; }
        .modal { background: #111111; width: 90%; max-width: 350px; padding: 30px; border-radius: 12px; border-top: 3px solid #ff4d4d; text-align: center; }
        .time-input-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .modal input { width: 100%; background: #0a0a0a; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; padding: 12px; color: white; text-align: center; font-weight: 800; }
        .modal-buttons { display: flex; gap: 10px; }
        .modal-btn { flex: 1; padding: 15px; border-radius: 8px; font-weight: 800; cursor: pointer; border: none; text-transform: uppercase; }
        .btn-confirm { background: #ff4d4d; color: white; }
        .btn-cancel { background: transparent; color: #888888; border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>

    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>MENU</h2>
            <button id="close-sidebar-btn" class="icon-btn">✕</button> 
        </div>
        <ul class="sidebar-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="budget-tracker.html">Budget Tracker</a></li>
            <li><a href="calendar.html">Calendar</a></li>
            <li><a href="todo-list.html">To-Do List</a></li>
        </ul>
    </nav>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <header class="navbar">
        <button id="menu-btn" class="icon-btn">☰</button>
        <h1 class="logo">FOCUS TIMER</h1>
        <div style="width: 40px;"></div>
    </header>

    <main class="container">
        <div class="summary-row">
            <div class="summary-box">
                <span class="summary-label" style="color: #00ff7f">SESSIONS</span>
                <hr class="divider">
                <span class="value" id="session-count">0</span>
            </div>
            <div class="summary-box">
                <span class="summary-label" style="color: #facc15">MODE</span>
                <hr class="divider">
                <span class="value" id="mode-text">FOCUS</span>
            </div>
        </div>

        <div class="mode-row">
            <button class="mode-btn active" id="focus-mode">FOCUS</button>
            <button class="mode-btn" id="break-mode">BREAK</button>
        </div>

        <div class="timer-display">
            <div class="digit-container"><span id="h1" class="digit">0</span></div>
            <div class="digit-container"><span id="h2" class="digit">0</span></div>
            <div class="separator">:</div>
            <div class="digit-container"><span id="m1" class="digit">0</span></div>
            <div class="digit-container"><span id="m2" class="digit">0</span></div>
            <div class="separator">:</div>
            <div class="digit-container"><span id="s1" class="digit">0</span></div>
            <div class="digit-container"><span id="s2" class="digit">0</span></div>
        </div>

        <div class="action-grid">
            <button class="action-btn btn-green" id="start-btn">START</button>
            <button class="action-btn" id="reset-btn">RESET</button>
            <button class="action-btn" id="clear-btn">CLEAR</button>
        </div>

        <div class="customize-row">
            <button class="clear-btn" id="customize-btn">⚙ CUSTOM FOCUS TIME</button>
        </div>
    </main>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h3 id="modal-title" style="margin-bottom: 20px;">SET CUSTOM TIME</h3>
            <div class="time-input-row">
                <div class="input-group"><input type="number" id="custom-h" placeholder="H" min="0"></div>
                <div class="input-group"><input type="number" id="custom-m" placeholder="M" min="0" max="59"></div>
                <div class="input-group"><input type="number" id="custom-s" placeholder="S" min="0" max="59"></div>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn btn-cancel" id="modal-cancel">CANCEL</button>
                <button class="modal-btn btn-confirm" id="modal-confirm">CONFIRM</button>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-mode');

        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const toggleSidebar = (show) => {
            sidebar.classList.toggle('open', show);
            sidebarOverlay.classList.toggle('show', show);
        };
        document.getElementById('menu-btn').onclick = () => toggleSidebar(true);
        document.getElementById('close-sidebar-btn').onclick = () => toggleSidebar(false);
        sidebarOverlay.onclick = () => toggleSidebar(false);

        let focusSettings = { h: 0, m: 0, s: 0 };
        let breakSettings = { h: 0, m: 0, s: 0 }; 
        let timeLeft = 0; 
        let timerId = null;
        let isRunning = false;
        let sessions = 0;
        let currentMode = 'FOCUS';

        const digitIds = ['h1', 'h2', 'm1', 'm2', 's1', 's2'];
        const startBtn = document.getElementById('start-btn');
        const focusModeBtn = document.getElementById('focus-mode');
        const breakModeBtn = document.getElementById('break-mode');
        const customizeBtn = document.getElementById('customize-btn');

        let audioCtx = null;

        function playAlarm(repeats = 5) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const beep = (count) => {
                if (count <= 0) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = "sine";
                osc.frequency.value = 880; 
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(1, audioCtx.currentTime + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.8);
                osc.start();
                osc.stop(audioCtx.currentTime + 1);
                setTimeout(() => beep(count - 1), 1200);
            };
            beep(repeats);
        }

        function updateUI() {
            const h = Math.floor(timeLeft / 3600).toString().padStart(2, '0');
            const m = Math.floor((timeLeft % 3600) / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');

            const fullString = h + m + s;

            for (let i = 0; i < 6; i++) {
                const el = document.getElementById(digitIds[i]);
                const newValue = fullString[i];

                if (el.textContent !== newValue) {
                    el.textContent = newValue;
                    el.classList.remove('roll-down');
                    void el.offsetWidth; 
                    el.classList.add('roll-down');
                }
            }

            document.getElementById('session-count').textContent = sessions;
            document.getElementById('mode-text').textContent = currentMode;
            focusModeBtn.classList.toggle('active', currentMode === 'FOCUS');
            breakModeBtn.classList.toggle('active', currentMode === 'BREAK');
            startBtn.textContent = isRunning ? "PAUSE" : "START";
            customizeBtn.innerHTML = `⚙ CUSTOM ${currentMode} TIME`;

            localStorage.setItem('timerState', JSON.stringify({
                timeLeft, currentMode, isRunning, sessions, focusSettings, breakSettings
            }));
        }

        function tick() {
            const endTime = localStorage.getItem('timerEndTime');
            if (endTime) {
                timeLeft = Math.max(0, Math.round((endTime - Date.now()) / 1000));
            } else if (isRunning) {
                timeLeft--;
            }

            if (timeLeft <= 0) {
                clearInterval(timerId);
                localStorage.removeItem('timerEndTime');
                isRunning = false;
                playAlarm(5);
                if (currentMode === 'FOCUS') {
                    sessions++;
                    setTimeout(() => switchMode('BREAK'), 100); 
                } else {
                    setTimeout(() => switchMode('FOCUS'), 100);
                }
            }
            updateUI();
        }

        function startTimer() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (timeLeft <= 0) return; 
            if (isRunning) {
                clearInterval(timerId);
                localStorage.removeItem('timerEndTime');
                isRunning = false;
            } else {
                isRunning = true;
                const endTime = Date.now() + (timeLeft * 1000);
                localStorage.setItem('timerEndTime', endTime);
                timerId = setInterval(tick, 1000);
            }
            updateUI();
        }

        function switchMode(mode) {
            if (isRunning && currentMode !== mode) {
                if (!confirm(`Switching to ${mode} mode will interrupt your session. Continue?`)) return;
            }
            clearInterval(timerId);
            isRunning = false;
            localStorage.removeItem('timerEndTime');
            currentMode = mode;
            const settings = (mode === 'FOCUS') ? focusSettings : breakSettings;
            timeLeft = (settings.h * 3600) + (settings.m * 60) + settings.s;
            updateUI();
        }

        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('timerState'));
            if (saved) {
                timeLeft = saved.timeLeft;
                currentMode = saved.currentMode;
                sessions = saved.sessions;
                focusSettings = saved.focusSettings;
                breakSettings = saved.breakSettings;
                isRunning = saved.isRunning;
            }
            const endTime = localStorage.getItem('timerEndTime');
            if (endTime && isRunning) {
                const remaining = Math.round((endTime - Date.now()) / 1000);
                if (remaining > 0) {
                    timeLeft = remaining;
                    timerId = setInterval(tick, 1000);
                } else {
                    isRunning = false;
                    localStorage.removeItem('timerEndTime');
                }
            }
            updateUI();
        };

        focusModeBtn.onclick = () => switchMode('FOCUS');
        breakModeBtn.onclick = () => switchMode('BREAK');
        startBtn.onclick = startTimer;
        document.getElementById('reset-btn').onclick = () => {
            if (isRunning && !confirm("Reset current timer?")) return;
            switchMode(currentMode);
        };
        document.getElementById('clear-btn').onclick = () => { sessions = 0; updateUI(); };

        const modal = document.getElementById('modal-overlay');
        customizeBtn.onclick = () => {
            document.getElementById('custom-h').value = "";
            document.getElementById('custom-m').value = "";
            document.getElementById('custom-s').value = "";
            document.getElementById('modal-title').innerText = `SET CUSTOM ${currentMode} TIME`;
            modal.style.display = 'flex';
        };
        document.getElementById('modal-cancel').onclick = () => modal.style.display = 'none';
        document.getElementById('modal-confirm').onclick = () => {
            const h = parseInt(document.getElementById('custom-h').value) || 0;
            const m = parseInt(document.getElementById('custom-m').value) || 0;
            const s = parseInt(document.getElementById('custom-s').value) || 0;
            if (currentMode === 'FOCUS') focusSettings = {h,m,s}; else breakSettings = {h,m,s};
            switchMode(currentMode);
            modal.style.display = 'none';
        };

    // SERVICE WORKER REGISTRATION
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW Registered!', reg))
                    .catch(err => console.error('SW Registration Failed:', err));
            });
        }
    </script>
</body>
</html>
