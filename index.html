<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIZO</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">
    <link rel="icon" href="icon/icon192/192.png" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #0a0a0a;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .navbar {
            background-color: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            color: white;
            z-index: 10;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            transition: background-color 0.3s ease;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 18px;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .icon-btn:hover {
            background: #ff4d4d;
            border-color: #ff4d4d;
            color: white !important;
        }

        .logo {
            font-size: 24px;
            letter-spacing: 4px;
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(to right, #ffffff, #ff4d4d);
            -webkit-background-clip: text; 
            background-clip: text;         
            -webkit-text-fill-color: transparent;
        }

        .container {
            margin-top: 80px;
            text-align: center;
            width: 100%;
            max-width: 500px;
            padding: 0 20px;
        }

        .section-title {
            color: white;
            font-size: 14px;
            margin-bottom: 25px;
            letter-spacing: 6px;
            font-weight: 800;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            transition: color 0.3s ease;
        }

        .section-title::before, .section-title::after {
            content: "";
            height: 2px;
            width: 30px;
            background: #ff4d4d;
        }

        /* --- Search Bar Styling --- */
        .search-container {
            margin-bottom: 30px;
            width: 100%;
        }

        #search-input {
            width: 100%;
            padding: 18px 20px;
            background-color: #151515;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        #search-input:focus {
            border-color: #ff4d4d;
            box-shadow: 0 5px 20px rgba(255, 77, 77, 0.15);
        }

        #search-input::placeholder {
            color: #666666;
            letter-spacing: 1px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .tool-btn {
            background-color: #151515;
            color: #eeeeee;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 35px 20px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
        }

        .tool-btn::after {
            content: "➔";
            position: absolute;
            right: 20px;
            opacity: 0.2;
            transition: 0.3s;
        }

        .tool-btn:hover {
            background-color: #1a1a1a;
            border-color: #ff4d4d;
            transform: translateY(-3px);
            color: #ffffff;
        }

        .tool-btn:hover::after {
            opacity: 1;
            right: 15px;
            color: #ff4d4d;
        }

        /* --- LEFT SIDEBAR (Menu) --- */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            transform: translateX(-100%);
            width: 280px;
            height: 100%;
            background-color: #0f0f0f;
            transition: transform 0.4s cubic-bezier(0.77, 0, 0.175, 1), background-color 0.3s ease;
            z-index: 1000;
            border-right: 1px solid #ff4d4d;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px;
            color: white;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: border-color 0.3s ease, color 0.3s ease;
        }

        .sidebar-header h2 {
            font-size: 18px;
            letter-spacing: 3px;
        }

        .sidebar-menu { list-style: none; margin-top: 10px; }
        .sidebar-menu a {
            display: block;
            color: #888888;
            text-decoration: none;
            padding: 18px 25px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .sidebar-menu a:hover, .sidebar-menu a.active { 
            color: #ffffff; 
            background: #151515; 
            border-left-color: #ff4d4d; 
            padding-left: 30px; 
        }

        /* --- RIGHT SIDEBAR (Profile) --- */
        .right-sidebar {
            position: fixed;
            top: 0;
            right: 0;
            transform: translateX(100%);
            width: 320px;
            height: 100%;
            background-color: #0f0f0f;
            transition: transform 0.4s cubic-bezier(0.77, 0, 0.175, 1), background-color 0.3s ease;
            z-index: 1000;
            border-left: 1px solid #ff4d4d;
            overflow-y: auto; 
        }

        .right-sidebar.open {
            transform: translateX(0);
        }

        .profile-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            padding: 20px;
        }

        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: border-color 0.3s ease;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #151515;
            border: 2px solid #ff4d4d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.2);
            transition: background 0.3s ease, color 0.3s ease;
        }

        .profile-name {
            font-size: 20px;
            font-weight: 800;
            color: white;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        .profile-username {
            font-size: 13px;
            font-weight: 600;
            color: #888888;
        }

        /* --- NEW: Styles for Editable Profile Fields & Placeholders --- */
        .editable-group {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .edit-icon {
            position: absolute;
            right: -24px;
            color: #555555;
            font-size: 12px;
            pointer-events: none;
            opacity: 0.5;
            transition: opacity 0.2s ease, color 0.2s ease;
        }

        .editable-group:hover .edit-icon {
            opacity: 1;
            color: #ff4d4d;
        }

        [contenteditable="true"]:empty:before {
            content: attr(data-placeholder);
            color: #555555;
            pointer-events: none;
            display: block;
        }

        .profile-name[contenteditable="true"], 
        .profile-username[contenteditable="true"] {
            outline: none;
            padding: 2px 8px;
            border-radius: 6px;
            transition: background 0.2s ease, box-shadow 0.2s ease;
        }

        .profile-name[contenteditable="true"]:hover, 
        .profile-username[contenteditable="true"]:hover {
            background: rgba(255, 255, 255, 0.05);
            cursor: text;
        }

        .profile-name[contenteditable="true"]:focus, 
        .profile-username[contenteditable="true"]:focus {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2);
        }

        .menu-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-group {
            background: #111111;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .menu-item:active {
            background: rgba(255, 77, 77, 0.1);
        }

        .menu-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-icon {
            font-size: 20px;
            width: 24px;
            text-align: center;
            filter: grayscale(20%); 
        }

        .menu-text {
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
            transition: color 0.3s ease;
        }

        .menu-arrow {
            font-size: 14px;
            color: #555555;
            font-weight: bold;
            transition: color 0.2s, transform 0.3s ease;
        }

        .menu-item:hover .menu-arrow {
            color: #ff4d4d;
        }

        /* --- Toggle Switch Styling --- */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 22px;
        }
        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #555555;
            transition: .4s;
            border-radius: 22px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #ff4d4d;
        }
        input:checked + .slider:before {
            transform: translateX(18px);
        }

        /* --- NO RESULTS MESSAGE --- */
        #no-results {
            display: none;
            color: #888;
            font-size: 14px;
            margin-top: 20px;
            letter-spacing: 1px;
        }

        /* --- OVERLAY --- */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: none;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .overlay.show {
            display: block;
            opacity: 1;
        }

        /* ========================================= */
        /* --- LIGHT MODE OVERRIDES --- */
        /* ========================================= */
        body.light-mode {
            background-color: #f4f4f9;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
            color: #111111;
        }
        
        body.light-mode .navbar {
            background-color: rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            color: #111111;
        }

        body.light-mode .icon-btn {
            background: rgba(0, 0, 0, 0.05);
            border-color: rgba(0, 0, 0, 0.1);
            color: #111111;
        }

        body.light-mode .section-title,
        body.light-mode .sidebar-header h2,
        body.light-mode .profile-name,
        body.light-mode .menu-text {
            color: #111111;
        }

        body.light-mode .sidebar,
        body.light-mode .right-sidebar {
            background-color: #ffffff;
        }

        body.light-mode .sidebar-header,
        body.light-mode .profile-header {
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            color: #111111;
        }

        body.light-mode .sidebar-menu a {
            color: #666666;
        }

        body.light-mode .sidebar-menu a:hover,
        body.light-mode .sidebar-menu a.active {
            background-color: #f4f4f9;
            color: #111111;
        }

        body.light-mode .profile-avatar {
            background-color: #ffffff;
            color: #111111;
        }

        /* Light Mode Editable Inputs Override */
        body.light-mode [contenteditable="true"]:empty:before {
            color: #999999;
        }
        body.light-mode .edit-icon {
            color: #999999;
        }
        body.light-mode .editable-group:hover .edit-icon {
            color: #ff4d4d;
        }

        body.light-mode .profile-name[contenteditable="true"]:hover, 
        body.light-mode .profile-username[contenteditable="true"]:hover {
            background: rgba(0, 0, 0, 0.03);
        }
        body.light-mode .profile-name[contenteditable="true"]:focus, 
        body.light-mode .profile-username[contenteditable="true"]:focus {
            background: rgba(0, 0, 0, 0.05);
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.1);
        }

        body.light-mode .menu-group {
            background-color: #ffffff;
            border-color: rgba(0, 0, 0, 0.08);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        body.light-mode .menu-item:hover {
            background: rgba(0, 0, 0, 0.03);
        }

        body.light-mode #settings-panel {
            border-top: 1px solid rgba(0, 0, 0, 0.08) !important;
        }

        body.light-mode #search-input {
            background-color: #ffffff;
            border-color: rgba(0, 0, 0, 0.08);
            color: #111111;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        body.light-mode .tool-btn {
            background-color: #ffffff;
            color: #111111;
            border-color: rgba(0, 0, 0, 0.08);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        body.light-mode .tool-btn:hover {
            background-color: #fafafa;
            border-color: #ff4d4d;
            color: #111111;
        }
        
        body.light-mode .logo {
            background: linear-gradient(to right, #111111, #ff4d4d);
            -webkit-background-clip: text; 
            background-clip: text;         
            -webkit-text-fill-color: transparent;
        }

    </style>
</head>
<body>

    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>MENU</h2>
            <button id="close-sidebar-btn" class="icon-btn">✕</button>
        </div>
        <ul class="sidebar-menu">
        </ul>
    </nav>

    <nav id="profile-sidebar" class="right-sidebar">
        <div class="sidebar-header">
            <h2>ACCOUNT</h2>
            <button id="close-profile-btn" class="icon-btn">✕</button>
        </div>
        
        <div class="profile-container">
            <div class="profile-header">
                <div class="profile-avatar" id="profile-avatar">?</div>
                
                <div class="editable-group">
                    <div class="profile-name" id="profile-name" contenteditable="true" spellcheck="false" data-placeholder="Add Name"></div>
                    <span class="edit-icon">✎</span>
                </div>
                
                <div class="editable-group">
                    <div class="profile-username" id="profile-username" contenteditable="true" spellcheck="false" data-placeholder="Add Username"></div>
                    <span class="edit-icon" style="font-size: 10px; right: -20px;">✎</span>
                </div>
            </div>

            <div class="menu-section">
                <div class="menu-group">
                    <a href="#" class="menu-item" id="settings-btn">
                        <div class="menu-left">
                            <span class="menu-icon">⚙️</span>
                            <span class="menu-text">Settings</span>
                        </div>
                        <span class="menu-arrow" id="settings-arrow">❯</span>
                    </a>
                    
                    <div id="settings-panel" style="display: none; border-top: 1px solid rgba(255, 255, 255, 0.05); background: rgba(0,0,0,0.02);">
                        <div class="menu-item" style="cursor: default;">
                            <div class="menu-left">
                                <span class="menu-icon">🌓</span>
                                <span class="menu-text" style="font-size: 13px;">Light Mode</span>
                            </div>
                            <label class="switch">
                                <input type="checkbox" id="theme-toggle">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>

                </div>
            </div>
            
            <button class="tool-btn" id="logout-btn" style="width: 100%; margin-top: 10px; padding: 20px;">Log Out</button>

        </div>
    </nav>

    <div id="overlay" class="overlay"></div>

    <header class="navbar">
        <button id="menu-btn" class="icon-btn">☰</button>
        <h1 class="logo">RIZO</h1>
        <button id="profile-btn" class="icon-btn">👤</button>
    </header>

    <main class="container">
        <h2 class="section-title">TOOLS</h2>
        
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search tools..." autocomplete="off">
        </div>

        <div class="button-group" id="tools-container">
            <button class="tool-btn" id="budget-btn">BUDGET TRACKER</button>
            <button class="tool-btn" id="calendar-btn">CALENDAR</button>
            <button class="tool-btn" id="focus-btn">FOCUS TIMER</button>
            <button class="tool-btn" id="todo-btn">TO-DO LIST</button>
        </div>
        
        <div id="no-results">No tools found matching your search.</div>
    </main>

    <script>
        // UI Logic
        const menuBtn = document.getElementById('menu-btn');
        const profileBtn = document.getElementById('profile-btn');
        const closeSidebarBtn = document.getElementById('close-sidebar-btn');
        const closeProfileBtn = document.getElementById('close-profile-btn');
        
        const sidebar = document.getElementById('sidebar');
        const profileSidebar = document.getElementById('profile-sidebar');
        const overlay = document.getElementById('overlay');

        // Function to handle the left sidebar
        const toggleSidebar = (show) => {
            sidebar.classList.toggle('open', show);
            manageOverlay();
        };

        // Function to handle the right profile sidebar
        const toggleProfileSidebar = (show) => {
            profileSidebar.classList.toggle('open', show);
            manageOverlay();
            
            // Reset settings dropdown when closing the profile sidebar
            if (!show) {
                const settingsPanel = document.getElementById('settings-panel');
                const settingsArrow = document.getElementById('settings-arrow');
                if(settingsPanel && settingsArrow) {
                    settingsPanel.style.display = 'none';
                    settingsArrow.style.transform = 'rotate(0deg)';
                }
            }
        };

        // Function to manage the dark overlay based on which sidebars are open
        const manageOverlay = () => {
            const isAnySidebarOpen = sidebar.classList.contains('open') || profileSidebar.classList.contains('open');
            
            if (isAnySidebarOpen) {
                overlay.style.display = 'block';
                setTimeout(() => overlay.classList.add('show'), 10);
            } else {
                overlay.classList.remove('show');
                setTimeout(() => { 
                    if(!overlay.classList.contains('show')) overlay.style.display = 'none'; 
                }, 400); // Perfectly timed with the 0.4s CSS transition
            }
        };

        // Event Listeners for Left Sidebar
        menuBtn.addEventListener('click', () => {
            toggleProfileSidebar(false); // Close right sidebar if open
            toggleSidebar(true);
        });
        closeSidebarBtn.addEventListener('click', () => toggleSidebar(false));

        // Event Listeners for Right Profile Sidebar
        profileBtn.addEventListener('click', () => {
            toggleSidebar(false); // Close left sidebar if open
            toggleProfileSidebar(true);
        });
        closeProfileBtn.addEventListener('click', () => toggleProfileSidebar(false));

        // Close everything when clicking the dark overlay
        overlay.addEventListener('click', () => {
            toggleSidebar(false);
            toggleProfileSidebar(false);
        });

        // Navigation for Home Page buttons
        const navigate = (page) => window.location.href = page;
        document.getElementById('budget-btn').onclick = () => navigate('budget-tracker.html');
        document.getElementById('todo-btn').onclick = () => navigate('todo-list.html');
        document.getElementById('focus-btn').onclick = () => navigate('focus-timer.html');
        document.getElementById('calendar-btn').onclick = () => navigate('calendar.html');

        // Log out button
        document.getElementById('logout-btn').onclick = () => {
            alert("Logging out of RIZO...");
        }

        // Search Filter Logic
        const searchInput = document.getElementById('search-input');
        const toolButtons = document.querySelectorAll('#tools-container .tool-btn');
        const noResultsMsg = document.getElementById('no-results');

        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            let hasVisibleTools = false;

            toolButtons.forEach(btn => {
                const toolName = btn.textContent.toLowerCase();
                
                if (toolName.includes(searchTerm)) {
                    btn.style.display = 'block';
                    hasVisibleTools = true;
                } else {
                    btn.style.display = 'none';
                }
            });

            if (hasVisibleTools) {
                noResultsMsg.style.display = 'none';
            } else {
                noResultsMsg.style.display = 'block';
            }
        });

        // --- Settings Panel & Light Mode Logic ---
        const settingsBtn = document.getElementById('settings-btn');
        const settingsPanel = document.getElementById('settings-panel');
        const settingsArrow = document.getElementById('settings-arrow');
        const themeToggle = document.getElementById('theme-toggle');

        // Toggle Settings Dropdown
        settingsBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (settingsPanel.style.display === 'none') {
                settingsPanel.style.display = 'block';
                settingsArrow.style.transform = 'rotate(90deg)';
            } else {
                settingsPanel.style.display = 'none';
                settingsArrow.style.transform = 'rotate(0deg)';
            }
        });

        // Check Local Storage for saved theme on page load
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'light') {
            document.body.classList.add('light-mode');
            themeToggle.checked = true;
        }

        // Listen for Theme Toggle Switch
        themeToggle.addEventListener('change', () => {
            if (themeToggle.checked) {
                document.body.classList.add('light-mode');
                localStorage.setItem('theme', 'light');
            } else {
                document.body.classList.remove('light-mode');
                localStorage.setItem('theme', 'dark');
            }
        });

        // --- NEW: Profile Customization Logic ---
        const profileName = document.getElementById('profile-name');
        const profileUsername = document.getElementById('profile-username');
        const profileAvatar = document.getElementById('profile-avatar');

        // Helper function to keep cursor at the end when formatting text dynamically
        function placeCaretAtEnd(el) {
            el.focus();
            if (typeof window.getSelection !== "undefined" && typeof document.createRange !== "undefined") {
                var range = document.createRange();
                range.selectNodeContents(el);
                range.collapse(false);
                var sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
            }
        }

        // Function to update avatar initials dynamically
        const updateAvatar = () => {
            const nameText = profileName.innerText.trim();
            let initials = '';
            if (nameText.length > 0) {
                initials = nameText.split(' ')
                                   .filter(word => word.length > 0)
                                   .map(word => word[0])
                                   .join('')
                                   .substring(0, 2)
                                   .toUpperCase();
            }
            profileAvatar.innerText = initials || '?';
        };

        // Load saved profile data on startup
        const savedName = localStorage.getItem('rizo_name');
        const savedUsername = localStorage.getItem('rizo_username');
        
        if (savedName) profileName.innerText = savedName;
        if (savedUsername) profileUsername.innerText = savedUsername;
        
        updateAvatar();

        // Save data when user clicks out of the text (blur)
        profileName.addEventListener('blur', () => {
            localStorage.setItem('rizo_name', profileName.innerText.trim());
            updateAvatar();
        });

        profileUsername.addEventListener('blur', () => {
            let userText = profileUsername.innerText.trim();
            // Automatically ensure it starts with an @ symbol if they typed something
            if (userText.length > 0 && !userText.startsWith('@')) {
                userText = '@' + userText;
            }
            userText = userText.substring(0, 8); // Enforce 8 char limit on final text
            profileUsername.innerText = userText;
            localStorage.setItem('rizo_username', userText);
        });

        // Profile Name Logic: 15 non-space limit, prevent Enter
        profileName.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                profileName.blur();
                return;
            }
            // Allow control keys (Backspace, Arrows, etc)
            if (['Backspace', 'Delete', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Tab'].includes(e.key) || e.ctrlKey || e.metaKey) return;
            
            let text = profileName.innerText;
            let nonSpaceCount = (text.match(/[^\s]/g) || []).length;
            // Prevent adding more characters if limit reached (except spaces)
            if (e.key !== ' ' && nonSpaceCount >= 15) {
                e.preventDefault();
            }
        });

        // Backup to strip out extra chars if pasted
        profileName.addEventListener('input', () => {
            let text = profileName.innerText;
            let nonSpaceCount = (text.match(/[^\s]/g) || []).length;
            if (nonSpaceCount > 15) {
                let newText = '';
                let count = 0;
                for (let i = 0; i < text.length; i++) {
                    if (text[i] !== ' ' && text[i] !== '\n' && text[i] !== '\r') {
                        if (count >= 15) continue;
                        count++;
                    }
                    newText += text[i];
                }
                profileName.innerText = newText;
                placeCaretAtEnd(profileName);
            }
        });

        // Profile Username Logic: 8 chars limit, lowercase only, prevent Enter
        profileUsername.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                profileUsername.blur();
                return;
            }
            if (['Backspace', 'Delete', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Tab'].includes(e.key) || e.ctrlKey || e.metaKey) return;
            
            if (profileUsername.innerText.length >= 8) {
                e.preventDefault();
            }
        });

        // Force lowercase and slice pasted text
        profileUsername.addEventListener('input', () => {
            let text = profileUsername.innerText;
            let newText = text.toLowerCase().substring(0, 8);
            if (text !== newText) {
                profileUsername.innerText = newText;
                placeCaretAtEnd(profileUsername);
            }
        });

        // SERVICE WORKER REGISTRATION
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW Registered!', reg))
                    .catch(err => console.error('SW Registration Failed:', err));
            });
        }
    </script>
