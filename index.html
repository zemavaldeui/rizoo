<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIZO</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#5f81b6">
    <link rel="icon" href="icon/icon192/192.png" />
    
    <style>
        /* --- CSS STYLING --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
        }

        body {
            background-color: #a4c5e3; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden; 
        }

        .navbar {
            background-color: #5f81b6; 
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            color: white;
            z-index: 10;
        }

        .icon-btn {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
        }

        .logo {
            font-size: 22px;
            letter-spacing: 1px;
            font-weight: bold;
        }

        .container {
            margin-top: 60px;
            text-align: center;
            width: 100%;
            max-width: 400px; 
            padding: 0 20px;
        }

        .section-title {
            color: white;
            font-size: 28px;
            margin-bottom: 30px;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 25px; 
        }

        .tool-btn {
            background-color: #6486b8; 
            color: white;
            border: none;
            padding: 40px 20px; 
            border-radius: 12px; 
            font-size: 16px;
            font-weight: 600; 
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); 
            transition: background-color 0.2s ease;
        }

        .tool-btn:hover { background-color: #4b6a96; }

        /* Sidebar & Overlay */
        .sidebar {
            position: fixed;
            top: 0;
            left: -250px; 
            width: 250px;
            height: 100%;
            background-color: #5f81b6; 
            transition: left 0.3s ease; 
            z-index: 1000; 
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2);
        }

        .sidebar.open { left: 0; }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            color: white;
            border-bottom: 1px solid rgba(255, 255, 255, 0.8);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none; 
            z-index: 999; 
        }

        .overlay.show { display: block; }
    </style>
</head>
<body>

    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>MENU</h2>
            <button id="close-sidebar-btn" class="icon-btn">✕</button> 
        </div>
        <ul class="sidebar-menu">
            </ul>
    </nav>

    <div id="overlay" class="overlay"></div>

    <header class="navbar">
        <button id="menu-btn" class="icon-btn">☰</button>
        <h1 class="logo">RIZO</h1>
        <button id="profile-btn" class="icon-btn">👤</button>
    </header>

    <main class="container">
        <h2 class="section-title">TOOLS</h2>
        <div class="button-group">
            <button class="tool-btn" id="budget-btn">BUDGET TRACKER</button>
            <button class="tool-btn" id="todo-btn">TO-DO LIST</button>
            <button class="tool-btn" id="focus-btn">FOCUS TIMER</button>
        </div>
    </main>

    <script>
        // UI Logic
        const menuBtn = document.getElementById('menu-btn');
        const closeSidebarBtn = document.getElementById('close-sidebar-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        const toggleSidebar = (show) => {
            sidebar.classList.toggle('open', show);
            overlay.classList.toggle('show', show);
        };

        menuBtn.addEventListener('click', () => toggleSidebar(true));
        closeSidebarBtn.addEventListener('click', () => toggleSidebar(false));
        overlay.addEventListener('click', () => toggleSidebar(false));

        // Navigation
        const navigate = (page) => window.location.href = page;
        document.getElementById('budget-btn').onclick = () => navigate('budget-tracker.html');
        document.getElementById('todo-btn').onclick = () => navigate('todo-list.html');
        document.getElementById('focus-btn').onclick = () => navigate('focus-timer.html');

        // SERVICE WORKER REGISTRATION
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW Registered!', reg))
                    .catch(err => console.error('SW Registration Failed:', err));
            });
        }
    </script>
</body>
</html>
