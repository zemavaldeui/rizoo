<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIZO</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#5f81b6">
    <link rel="icon" href="icon/icon192/192.png" />

    <style>
        /* --- CSS STYLING --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        
        body { 
            background-color: #a4c5e3; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        .navbar { background-color: #5f81b6; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; color: white; z-index: 10; flex-shrink: 0; }
        .icon-btn { background: none; border: none; color: white; font-size: 28px; cursor: pointer; transition: opacity 0.2s; }
        .icon-btn:hover { opacity: 0.7; }
        .logo { font-size: 22px; letter-spacing: 1px; font-weight: bold; }

        .container { 
            width: 100%; 
            max-width: 400px; 
            padding: 15px 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            flex-grow: 1; 
            margin: 0 auto;
            overflow: hidden; 
        }
        
        .summary-row { display: flex; justify-content: space-between; gap: 15px; flex-shrink: 0; }
        .summary-box { background-color: #6486b8; flex: 1; padding: 12px 10px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        .summary-label { font-size: 11px; font-weight: 800; letter-spacing: 1px; display: block; margin-bottom: 5px; }
        .text-green { color: #00ff7f; } 
        .text-red { color: #ff3b30; }   
        .divider { border: 0; height: 1px; background: rgba(255, 255, 255, 0.3); margin-bottom: 8px; }
        .summary-amount { color: white; font-size: 22px; font-weight: bold; }

        .task-list-box { background-color: #6486b8; border-radius: 12px; padding: 15px; flex-grow: 1; overflow-y: auto; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); display: flex; flex-direction: column; min-height: 100px; }
        .task-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        
        .empty-message { text-align: center; color: rgba(255, 255, 255, 0.6); font-size: 14px; font-weight: bold; padding: 20px 0; margin: auto; }

        .task-item { background-color: #7998c9; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; color: white; border-left: 5px solid transparent; }
        .task-item.missed { border-left-color: #ff3b30; } 
        .task-item.upcoming { border-left-color: #ffcc00; } 
        .task-item.completed { border-left-color: #00ff7f; opacity: 0.6; } 
        .task-item.completed .task-text { text-decoration: line-through; }
        
        .task-info { display: flex; flex-direction: column; flex-grow: 1; margin-right: 10px; }
        .task-text { font-size: 14px; font-weight: bold; }
        .task-datetime { font-size: 11px; opacity: 0.9; }

        .task-controls { display: flex; gap: 8px; }
        .btn-check, .btn-delete { background: none; border: none; font-size: 18px; cursor: pointer; color: white; }

        .input-area { display: flex; gap: 10px; flex-shrink: 0; background: #a4c5e3; padding-top: 5px; }
        .input-left { flex: 1.5; }
        .input-right { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        
        .custom-input { width: 100%; background-color: #6486b8; border: none; color: white; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: 600; }
        .custom-input::placeholder { color: rgba(255, 255, 255, 0.6); }
        textarea.custom-input { height: 75px; resize: none; }

        input[type="date"]::before { content: "Date: "; color: rgba(255, 255, 255, 0.6); margin-right: 5px; }
        input[type="time"]::before { content: "Time: "; color: rgba(255, 255, 255, 0.6); margin-right: 5px; }
        
        ::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.8; }

        .action-btn { background-color: #5f81b6; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-size: 14px; font-weight: 800; cursor: pointer; flex-shrink: 0; margin-bottom: 5px; }

        /* --- SIDEBAR --- */
        .sidebar { position: fixed; top: 0; left: -250px; width: 250px; height: 100%; background-color: #5f81b6; transition: left 0.3s ease; z-index: 1000; box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2); }
        .sidebar.open { left: 0; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; color: white; border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
        .sidebar-menu { list-style: none; margin-top: 10px; }
        .sidebar-menu a { display: block; color: white; text-decoration: none; padding: 20px; font-size: 18px; font-weight: bold; transition: all 0.3s ease; }
        .sidebar-menu a:hover { background-color: #7998c9; padding-left: 30px; color: #00ff7f; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); display: none; z-index: 999; }
        .sidebar-overlay.show { display: block; }
    </style>
</head>
<body>

    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>MENU</h2>
            <button id="close-sidebar-btn" class="icon-btn">✕</button> 
        </div>
        <ul class="sidebar-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="budget-tracker.html">Budget Tracker</a></li>
            <li><a href="focus-timer.html">Focus Timer</a></li>
        </ul>
    </nav>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <header class="navbar">
        <button id="menu-btn" class="icon-btn">☰</button>
        <h1 class="logo">TO-DO LIST</h1>
        <button class="icon-btn" id="profile-btn">👤</button>
    </header>

    <main class="container">
        <div class="summary-row">
            <div class="summary-box">
                <span class="summary-label text-green">COMPLETED TASK</span>
                <hr class="divider">
                <span class="summary-amount" id="completed-count">00</span>
            </div>
            <div class="summary-box">
                <span class="summary-label text-red">TASK TO-DO</span>
                <hr class="divider">
                <span class="summary-amount" id="todo-count">00</span>
            </div>
        </div>

        <div class="task-list-box">
            <ul class="task-list" id="task-list"></ul>
            <button id="btn-clear-tasks" style="display: none; background:none; border:1px solid white; color:white; border-radius:5px; padding:5px; margin-top:10px; font-size:10px; cursor:pointer;">Clear All Tasks</button>
        </div>

        <div class="input-area">
            <div class="input-left">
                <textarea id="task-input" class="custom-input" placeholder="WHAT TO DO?"></textarea>
            </div>
            <div class="input-right">
                <input type="date" id="date-input" class="custom-input" required>
                <input type="time" id="time-input" class="custom-input" required>
            </div>
        </div>

        <button class="action-btn" id="add-task-btn">＋ ADD TASK</button>
    </main>

    <script>
        // SIDEBAR LOGIC
        const menuBtn = document.getElementById('menu-btn');
        const closeSidebarBtn = document.getElementById('close-sidebar-btn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');

        function openSidebar() { sidebar.classList.add('open'); sidebarOverlay.classList.add('show'); }
        function closeSidebar() { sidebar.classList.remove('open'); sidebarOverlay.classList.remove('show'); }

        menuBtn.addEventListener('click', openSidebar);
        closeSidebarBtn.addEventListener('click', closeSidebar);
        sidebarOverlay.addEventListener('click', closeSidebar);

        // TO-DO LOGIC
        let tasks = []; 
        const taskInput = document.getElementById('task-input');
        const dateInput = document.getElementById('date-input');
        const timeInput = document.getElementById('time-input');
        const addTaskBtn = document.getElementById('add-task-btn');
        const taskList = document.getElementById('task-list');
        const completedCountDisplay = document.getElementById('completed-count');
        const todoCountDisplay = document.getElementById('todo-count');
        const clearBtn = document.getElementById('btn-clear-tasks');

        function loadTasks() {
            const savedTasks = localStorage.getItem('todoData');
            if (savedTasks) tasks = JSON.parse(savedTasks);
            renderTasks();
        }

        function saveTasks() { localStorage.setItem('todoData', JSON.stringify(tasks)); }
        function formatCount(num) { return num < 10 ? '0' + num : num; }

        function formatTime12Hour(timeStr) {
            if (!timeStr) return '';
            let [hours, minutes] = timeStr.split(':');
            hours = parseInt(hours, 10);
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12; 
            return `${hours}:${minutes} ${ampm}`;
        }

        function formatDateWithWords(dateStr) {
            if (!dateStr) return '';
            const dateObj = new Date(dateStr + 'T00:00:00'); 
            const options = { month: 'short', day: 'numeric' };
            return dateObj.toLocaleDateString(undefined, options);
        }

        function getTaskStatus(task) {
            if (task.completed) return 'completed';
            if (!task.date) return 'normal'; 
            let targetDateStr = task.date;
            targetDateStr += task.time ? 'T' + task.time : 'T23:59:59';
            const timeDiff = new Date(targetDateStr).getTime() - new Date().getTime();
            if (timeDiff < 0) return 'missed';
            if (timeDiff <= 86400000) return 'upcoming'; 
            return 'normal';
        }

        function renderTasks() {
            taskList.innerHTML = '';
            let completedCount = 0, todoCount = 0;
            if (tasks.length === 0) {
                taskList.innerHTML = '<li class="empty-message">No task to do</li>';
                clearBtn.style.display = 'none';
            } else {
                clearBtn.style.display = 'block';
                tasks.forEach((task, index) => {
                    if (task.completed) completedCount++; else todoCount++;
                    const status = getTaskStatus(task);
                    const li = document.createElement('li');
                    li.className = `task-item ${status}`;
                    let dt = task.date ? formatDateWithWords(task.date) : '';
                    if(task.date && task.time) dt += ' @ ' + formatTime12Hour(task.time);

                    li.innerHTML = `
                        <div class="task-info">
                            <span class="task-text">${task.text}</span>
                            <span class="task-datetime">${dt}</span>
                        </div>
                        <div class="task-controls">
                            <button class="btn-check" onclick="toggleTask(${index})">${task.completed ? '↩️' : '✔️'}</button>
                            <button class="btn-delete" onclick="deleteTask(${index})">❌</button>
                        </div>
                    `;
                    taskList.appendChild(li);
                });
            }
            completedCountDisplay.innerText = formatCount(completedCount);
            todoCountDisplay.innerText = formatCount(todoCount);
        }

        addTaskBtn.addEventListener('click', () => {
            if (!taskInput.value.trim()) return; 
            tasks.push({ text: taskInput.value.trim(), date: dateInput.value, time: timeInput.value, completed: false });
            taskInput.value = ''; dateInput.value = ''; timeInput.value = '';
            saveTasks(); renderTasks();
        });

        window.toggleTask = (index) => { tasks[index].completed = !tasks[index].completed; saveTasks(); renderTasks(); };
        window.deleteTask = (index) => { tasks.splice(index, 1); saveTasks(); renderTasks(); };
        clearBtn.addEventListener('click', () => { if (confirm("Clear all tasks?")) { tasks = []; saveTasks(); renderTasks(); } });

        loadTasks();

        // SERVICE WORKER REGISTRATION (Essential for Offline)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('To-Do SW Registered!', reg))
                    .catch(err => console.log('To-Do SW Registration failed:', err));
            });
        }
    </script>
</body>
</html>
