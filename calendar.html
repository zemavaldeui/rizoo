<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIZO - Schedule</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="icon" href="icon/icon192/192.png" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #0a0a0a;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* --- NAVBAR & SIDEBAR (RIZO Theme) --- */
        .navbar {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            z-index: 10;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .icon-btn:hover { 
            background: #ff4d4d; 
            border-color: #ff4d4d; 
        }

        .logo {
            font-size: 24px;
            letter-spacing: 4px;
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(to right, #ffffff, #ff4d4d);
            -webkit-background-clip: text; 
            background-clip: text;         
            -webkit-text-fill-color: transparent;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background-color: #0f0f0f;
            border-right: 1px solid #ff4d4d;
            transition: transform 0.4s cubic-bezier(0.77, 0, 0.175, 1), background-color 0.3s ease;
            z-index: 1000;
        }

        .sidebar.open { transform: translateX(280px); }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px;
            color: white;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: border-color 0.3s ease, color 0.3s ease;
        }

        .sidebar-header h2 { font-size: 18px; letter-spacing: 2px; font-weight: 800; }

        .sidebar-menu { list-style: none; margin-top: 10px; }

        .sidebar-menu a {
            display: block;
            color: #888888;
            text-decoration: none;
            padding: 18px 25px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .sidebar-menu a:hover {
            color: #ffffff;
            background: #151515;
            border-left-color: #ff4d4d;
            padding-left: 30px;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            display: none;
            z-index: 999;
        }

        .sidebar-overlay.show { display: block; }

        .container {
            margin-top: 30px;
            width: 100%;
            max-width: 420px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex-grow: 1;
        }

        /* --- CALENDAR WIDGET STYLES (RIZO Integrated) --- */
        :root {
            /* Dynamic CSS Variables driven by JS (defaults mapped) */
            --color-exam: #00ff7f; 
            --color-health: #ff4d4d; 
            --color-personal: #ffcc00; 
        }

        .calendar {
            background: #111111;
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
            min-height: 460px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            border-radius: 8px;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 800;
            transition: all 0.3s ease;
        }

        .header button:hover {
            background: #ff4d4d;
            border-color: #ff4d4d;
            transform: scale(1.05);
        }

        .header h2 {
            margin: 0;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
            margin-bottom: 10px;
        }

        .weekdays div {
            font-weight: 800;
            font-size: 10px;
            color: #888888;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: repeat(6, 1fr); 
            gap: 5px;
            text-align: center;
            flex-grow: 1;
        }

        .day {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #151515;
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            color: #cccccc;
            position: relative;
            transition: all 0.2s ease;
            overflow: hidden; 
            min-width: 0; 
        }

        .day:hover {
            background-color: #222222;
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .day.today {
            border: 2px solid #ff4d4d;
            color: #ff4d4d;
            font-weight: 900;
        }

        .empty-slot {
            pointer-events: none;
            background: transparent;
            border: none;
        }

        /* Highlight Styles */
        .day.has-event {
            color: #0a0a0a;
            font-weight: 900;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .day.event-exam { background-color: var(--color-exam); }
        .day.event-health { background-color: var(--color-health); }
        .day.event-personal { background-color: var(--color-personal); }

        .event-label {
            font-size: 8px;
            font-weight: 800;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%; 
            max-width: 90%;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* --- NEW: Legend & Customization Styles --- */
        .legend-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            margin-bottom: 20px;
            width: 100%;
        }

        .legend {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            padding: 5px 0;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            font-weight: 700;
            color: #888888;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .legend-color {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .clear-btn {
            background: #151515; 
            border: 1px solid rgba(255,255,255,0.1);
            color: #cccccc;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }

        .clear-btn:hover {
            background: #222222;
            border-color: rgba(255, 255, 255, 0.2);
            color: white;
        }

        /* --- MODAL STYLES (RIZO Integrated) --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1100;
        }

        .modal-content {
            background-color: #111111;
            width: 90%;
            max-width: 350px;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #ff4d4d;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: center;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .modal-content h3 {
            color: white;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .modal-content input[type="text"], .modal-content select {
            width: 100%;
            background: #0a0a0a;
            color: white;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s, background-color 0.3s, color 0.3s;
        }

        .modal-content input[type="text"]:focus, .modal-content select:focus {
            border-color: #ff4d4d;
        }

        /* Label Editor specific */
        .label-edit-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .label-edit-row input[type="color"] {
            width: 50px;
            height: 50px;
            padding: 2px;
            background: #0a0a0a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .modal-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .modal-actions > div {
            display: flex;
            gap: 10px;
            flex-grow: 1;
            justify-content: flex-end;
        }

        .modal-btn {
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 11px;
            transition: all 0.2s;
        }

        #saveEventBtn, #saveLabelsBtn { background-color: #ff4d4d; color: white; box-shadow: 0 4px 15px rgba(255, 77, 77, 0.2); }
        #saveEventBtn:hover, #saveLabelsBtn:hover { background-color: #ff6666; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 77, 77, 0.4); }
        
        #cancelBtn, #cancelLabelsBtn { background-color: transparent; color: #888888; border: 1px solid rgba(255, 255, 255, 0.1); }
        #cancelBtn:hover, #cancelLabelsBtn:hover { background-color: rgba(255, 255, 255, 0.05); color: white; }

        #deleteEventBtn {
            background-color: transparent;
            color: #ff4d4d;
            border: 1px solid rgba(255, 77, 77, 0.3);
            padding: 12px 15px;
            border-radius: 8px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        #deleteEventBtn:hover { background-color: rgba(255, 77, 77, 0.1); border-color: #ff4d4d; }

        /* ========================================= */
        /* --- LIGHT MODE OVERRIDES --- */
        /* ========================================= */
        body.light-mode {
            background-color: #f4f4f9;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
            color: #111111;
        }
        
        body.light-mode .navbar {
            background-color: rgba(255, 255, 255, 0.8);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            color: #111111;
        }

        body.light-mode .icon-btn {
            background: rgba(0, 0, 0, 0.05);
            border-color: rgba(0, 0, 0, 0.1);
            color: #111111;
        }

        body.light-mode .logo {
            background: linear-gradient(to right, #111111, #ff4d4d);
            -webkit-background-clip: text; 
            background-clip: text;         
            -webkit-text-fill-color: transparent;
        }

        body.light-mode .sidebar { background-color: #ffffff; }
        body.light-mode .sidebar-header { border-bottom: 1px solid rgba(0, 0, 0, 0.08); color: #111111; }
        body.light-mode .sidebar-menu a { color: #666666; }
        body.light-mode .sidebar-menu a:hover { background-color: #f4f4f9; color: #111111; }

        /* Calendar specific light mode */
        body.light-mode .calendar,
        body.light-mode .modal-content {
            background-color: #ffffff;
            border-color: rgba(0, 0, 0, 0.08);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        body.light-mode .header h2, body.light-mode .modal-content h3 { color: #111111; }
        
        body.light-mode .header button {
            background: rgba(0, 0, 0, 0.05);
            border-color: rgba(0, 0, 0, 0.1);
            color: #111111;
        }
        body.light-mode .header button:hover { background: #ff4d4d; border-color: #ff4d4d; color: white; }

        body.light-mode .day { background: #fafafa; border-color: rgba(0, 0, 0, 0.05); color: #333333; }
        body.light-mode .day:hover { background: #f0f0f0; border-color: rgba(0,0,0,0.1); color: #111; }
        body.light-mode .day.has-event { color: #0a0a0a; }
        body.light-mode .day.event-exam, body.light-mode .day.event-exam:hover { background-color: var(--color-exam); }
        body.light-mode .day.event-health, body.light-mode .day.event-health:hover { background-color: var(--color-health); }
        body.light-mode .day.event-personal, body.light-mode .day.event-personal:hover { background-color: var(--color-personal); }
        body.light-mode .day.today { border-color: #ff4d4d; color: #ff4d4d; }

        body.light-mode .modal-content input[type="text"], 
        body.light-mode .modal-content select,
        body.light-mode .label-edit-row input[type="color"] {
            background-color: #fafafa;
            border-color: rgba(0, 0, 0, 0.1);
            color: #111111;
        }
        body.light-mode .modal-content input[type="text"]:focus, 
        body.light-mode .modal-content select:focus {
            background-color: #ffffff;
            border-color: #ff4d4d;
        }
        
        body.light-mode #cancelBtn, body.light-mode #cancelLabelsBtn { color: #666666; border-color: rgba(0, 0, 0, 0.1); }
        body.light-mode #cancelBtn:hover, body.light-mode #cancelLabelsBtn:hover { background-color: rgba(0, 0, 0, 0.05); color: #111111; }
        
        /* Updated Clear/Edit Button Light Mode */
        body.light-mode .clear-btn { background: #ffffff; border-color: rgba(0, 0, 0, 0.1); color: #666666; }
        body.light-mode .clear-btn:hover { background: #fafafa; border-color: rgba(0, 0, 0, 0.2); color: #111111; }

    </style>
</head>
<body>

    <nav id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>MENU</h2>
            <button id="close-sidebar-btn" class="icon-btn">✕</button> 
        </div>
        <ul class="sidebar-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="budget-tracker.html">Budget Tracker</a></li>
            <li><a href="focus-timer.html">Focus Timer</a></li>
            <li><a href="todo-list.html">To-Do List</a></li>
        </ul>
    </nav>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <header class="navbar">
        <button id="menu-btn" class="icon-btn">☰</button>
        <h1 class="logo">SCHEDULE</h1>
        <div style="width: 40px;"></div> 
    </header>

    <main class="container">
        <div class="calendar">
            <div class="header">
                <button id="prevBtn">&lt;</button>
                <h2 id="monthYear"></h2>
                <button id="nextBtn">&gt;</button>
            </div>
            <div class="weekdays">
                <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
            </div>
            <div class="days" id="daysGrid"></div>
        </div>

        <div class="legend-container">
            <div class="legend" id="calendar-legend">
                </div>
            <div style="display: flex; gap: 10px; width: 100%; justify-content: center;">
                <button class="clear-btn" id="edit-labels-btn">Customize Labels</button>
                <button class="clear-btn" id="clear-month-btn">Clear Schedule</button>
            </div>
        </div>
    </main>

    <div class="modal" id="eventModal">
        <div class="modal-content">
            <h3>Add / Edit Schedule</h3>
            <input type="text" id="eventTitle" placeholder="Event Name">
            <select id="eventType">
                <option value="health">Health</option>
                <option value="exam">School</option>
                <option value="personal">Personal / Other</option>
            </select>
            <div class="modal-actions">
                <button id="deleteEventBtn">Delete</button>
                <div>
                    <button class="modal-btn" id="cancelBtn">Cancel</button>
                    <button class="modal-btn" id="saveEventBtn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="labelsModal">
        <div class="modal-content">
            <h3>Customize Labels</h3>
            
            <div class="label-edit-row">
                <input type="color" id="color-personal">
                <input type="text" id="name-personal" placeholder="Label 1 Name">
            </div>
            
            <div class="label-edit-row">
                <input type="color" id="color-exam">
                <input type="text" id="name-exam" placeholder="Label 2 Name">
            </div>
            
            <div class="label-edit-row">
                <input type="color" id="color-health">
                <input type="text" id="name-health" placeholder="Label 3 Name">
            </div>

            <div class="modal-actions">
                <div style="justify-content: space-between; width: 100%;">
                    <button class="modal-btn" id="cancelLabelsBtn">Cancel</button>
                    <button class="modal-btn" id="saveLabelsBtn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* --- Check Local Storage for Theme Setup on Page Load --- */
        const currentTheme = localStorage.getItem('theme');
        if (currentTheme === 'light') {
            document.body.classList.add('light-mode');
        }

        // --- SIDEBAR LOGIC ---
        const menuBtn = document.getElementById('menu-btn');
        const closeSidebarBtn = document.getElementById('close-sidebar-btn');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');

        function openSidebar() { 
            sidebar.classList.add('open'); 
            sidebarOverlay.classList.add('show'); 
        }
        
        function closeSidebar() { 
            sidebar.classList.remove('open'); 
            sidebarOverlay.classList.remove('show'); 
        }

        menuBtn.addEventListener('click', openSidebar);
        closeSidebarBtn.addEventListener('click', closeSidebar);
        sidebarOverlay.addEventListener('click', closeSidebar);

        // --- NEW: DYNAMIC LABELS LOGIC ---
        const defaultLabels = {
            health: { name: "Health", color: "#ff4d4d" },              // Red
            exam: { name: "School", color: "#00ff7f" },             // Green
            personal: { name: "Personal / Other", color: "#ffcc00" } // Yellow
        };

        let userLabels = JSON.parse(localStorage.getItem('calendarLabels')) || defaultLabels;

        function applyLabels() {
            // Update CSS Variables to drive Calendar dots
            document.documentElement.style.setProperty('--color-personal', userLabels.personal.color);
            document.documentElement.style.setProperty('--color-exam', userLabels.exam.color);
            document.documentElement.style.setProperty('--color-health', userLabels.health.color);

            // Populate Legend UI (Reordered: Health, Exam, Personal)
            const legendContainer = document.getElementById('calendar-legend');
            legendContainer.innerHTML = `
                <div class="legend-item"><div class="legend-color" style="background-color: ${userLabels.health.color}; box-shadow: 0 0 8px ${userLabels.health.color}80;"></div>${userLabels.health.name}</div>
                <div class="legend-item"><div class="legend-color" style="background-color: ${userLabels.exam.color}; box-shadow: 0 0 8px ${userLabels.exam.color}80;"></div>${userLabels.exam.name}</div>
                <div class="legend-item"><div class="legend-color" style="background-color: ${userLabels.personal.color}; box-shadow: 0 0 8px ${userLabels.personal.color}80;"></div>${userLabels.personal.name}</div>
            `;

            // Update Select Options dynamically without changing HTML structure natively
            document.querySelector('#eventType option[value="personal"]').textContent = userLabels.personal.name;
            document.querySelector('#eventType option[value="exam"]').textContent = userLabels.exam.name;
            document.querySelector('#eventType option[value="health"]').textContent = userLabels.health.name;
        }

        // Labels Modal Handlers
        const labelsModal = document.getElementById('labelsModal');

        document.getElementById('edit-labels-btn').addEventListener('click', () => {
            document.getElementById('color-personal').value = userLabels.personal.color;
            document.getElementById('name-personal').value = userLabels.personal.name;
            
            document.getElementById('color-exam').value = userLabels.exam.color;
            document.getElementById('name-exam').value = userLabels.exam.name;
            
            document.getElementById('color-health').value = userLabels.health.color;
            document.getElementById('name-health').value = userLabels.health.name;

            labelsModal.style.display = 'flex';
        });

        document.getElementById('cancelLabelsBtn').addEventListener('click', () => {
            labelsModal.style.display = 'none';
        });

        document.getElementById('saveLabelsBtn').addEventListener('click', () => {
            userLabels.personal.color = document.getElementById('color-personal').value;
            userLabels.personal.name = document.getElementById('name-personal').value || "Personal";

            userLabels.exam.color = document.getElementById('color-exam').value;
            userLabels.exam.name = document.getElementById('name-exam').value || "School";

            userLabels.health.color = document.getElementById('color-health').value;
            userLabels.health.name = document.getElementById('name-health').value || "Health";

            localStorage.setItem('calendarLabels', JSON.stringify(userLabels));
            applyLabels();
            labelsModal.style.display = 'none';
        });


        // --- CALENDAR LOGIC ---
        const monthYearText = document.getElementById('monthYear');
        const daysGrid = document.getElementById('daysGrid');
        const modal = document.getElementById('eventModal');
        let currentSelectedDateKey = null;

        let date = new Date();
        // Load data from Local Storage so it saves when you refresh
        let schedules = JSON.parse(localStorage.getItem('calendarSchedules')) || {};

        function renderCalendar() {
            daysGrid.innerHTML = '';
            
            const year = date.getFullYear();
            const month = date.getMonth();
            
            // Format Month and Year for the header
            monthYearText.textContent = new Intl.DateTimeFormat('en-US', { month: 'long', year: 'numeric' }).format(date);
            
            const firstDayIndex = new Date(year, month, 1).getDay();
            const lastDay = new Date(year, month + 1, 0).getDate();
            
            // Blank spaces for previous month days
            for (let i = 0; i < firstDayIndex; i++) {
                const emptyDiv = document.createElement('div');
                emptyDiv.classList.add('empty-slot');
                daysGrid.appendChild(emptyDiv);
            }
            
            // Render actual days
            const today = new Date();
            for (let i = 1; i <= lastDay; i++) {
                const dayDiv = document.createElement('div');
                dayDiv.classList.add('day');
                dayDiv.textContent = i;
                
                const dateKey = `${year}-${month + 1}-${i}`;
                
                // Highlight today
                if (i === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
                    dayDiv.classList.add('today');
                }
                
                // Check for saved events
                if (schedules[dateKey]) {
                    dayDiv.classList.add('has-event', `event-${schedules[dateKey].type}`);
                    const label = document.createElement('div');
                    label.classList.add('event-label');
                    label.textContent = schedules[dateKey].title;
                    dayDiv.appendChild(label);
                }
                
                // Click handler
                dayDiv.addEventListener('click', () => openModal(dateKey));
                
                daysGrid.appendChild(dayDiv);
            }

            // Fill the remaining slots to keep the layout height completely rigid (42 cells max)
            const totalRenderedSlots = firstDayIndex + lastDay;
            const remainingSlots = 42 - totalRenderedSlots;

            for (let i = 0; i < remainingSlots; i++) {
                const emptyDiv = document.createElement('div');
                emptyDiv.classList.add('empty-slot');
                daysGrid.appendChild(emptyDiv);
            }
        }

        function openModal(dateKey) {
            currentSelectedDateKey = dateKey;
            const existingEvent = schedules[dateKey];
            
            if (existingEvent) {
                document.getElementById('eventTitle').value = existingEvent.title;
                document.getElementById('eventType').value = existingEvent.type;
                document.getElementById('deleteEventBtn').style.visibility = 'visible'; // Keep spacing layout intact
            } else {
                document.getElementById('eventTitle').value = '';
                document.getElementById('eventType').value = 'health'; // Changed default to match new order if needed, or leave personal
                document.getElementById('deleteEventBtn').style.visibility = 'hidden';
            }
            
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
            currentSelectedDateKey = null;
        }

        // Event Listeners for UI
        document.getElementById('prevBtn').addEventListener('click', () => {
            date.setMonth(date.getMonth() - 1);
            renderCalendar();
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            date.setMonth(date.getMonth() + 1);
            renderCalendar();
        });

        document.getElementById('cancelBtn').addEventListener('click', closeModal);

        document.getElementById('saveEventBtn').addEventListener('click', () => {
            const title = document.getElementById('eventTitle').value;
            const type = document.getElementById('eventType').value;
            
            if (title.trim() === '') return alert("Please enter an event name.");
            
            schedules[currentSelectedDateKey] = { title, type };
            localStorage.setItem('calendarSchedules', JSON.stringify(schedules));
            
            closeModal();
            renderCalendar();
        });

        document.getElementById('deleteEventBtn').addEventListener('click', () => {
            delete schedules[currentSelectedDateKey];
            localStorage.setItem('calendarSchedules', JSON.stringify(schedules));
            closeModal();
            renderCalendar();
        });

        // --- NEW: Clear Month Schedule Logic ---
        document.getElementById('clear-month-btn').addEventListener('click', () => {
            const currentYear = date.getFullYear();
            const currentMonth = date.getMonth() + 1; // 1-12
            
            // Quickly check if there are any events for this specific month
            let hasEventsThisMonth = false;
            for (const key in schedules) {
                const [yearStr, monthStr] = key.split('-');
                if (parseInt(yearStr) === currentYear && parseInt(monthStr) === currentMonth) {
                    hasEventsThisMonth = true;
                    break;
                }
            }

            if (!hasEventsThisMonth) {
                alert("There are no scheduled events to clear for this month.");
                return;
            }

            if (confirm("Are you sure you want to clear all schedules for this month?")) {
                for (const key in schedules) {
                    const [yearStr, monthStr] = key.split('-');
                    if (parseInt(yearStr) === currentYear && parseInt(monthStr) === currentMonth) {
                        delete schedules[key];
                    }
                }
                localStorage.setItem('calendarSchedules', JSON.stringify(schedules));
                renderCalendar();
            }
        });

        // Initialize Call
        applyLabels();
        renderCalendar();
    </script>
</body>
</html>
